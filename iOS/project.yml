name: Hearth
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Hearth:
    type: application
    platform: iOS
    sources:
      - Hearth
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hearthplanner
        PRODUCT_NAME: Hearth
        DEVELOPMENT_TEAM: W7Q885Q59C
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Hearth/Info.plist
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic

  HearthTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - HearthTests
    dependencies:
      - target: Hearth
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hearthplanner.tests
        DEVELOPMENT_TEAM: W7Q885Q59C
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Hearth.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Hearth"
        BUNDLE_LOADER: "$(TEST_HOST)"

  HearthUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - HearthUITests
    dependencies:
      - target: Hearth
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hearthplanner.uitests
        DEVELOPMENT_TEAM: W7Q885Q59C
        TEST_TARGET_NAME: Hearth

schemes:
  Hearth:
    build:
      targets:
        Hearth: all
        HearthTests: [test]
        HearthUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HearthTests
        - HearthUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
